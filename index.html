<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABN-CoalDumping</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/abnlogo.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/abnlogo.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/abnlogo.ico">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { background: #f8fafc; font-family: sans-serif; min-height: 100vh; touch-action: manipulation; }
        .page { display: none; min-height: 100vh; padding-bottom: 120px; }
        .active-page { display: block; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 2rem; }
        .btn-tap:active { transform: scale(0.95); }
        input, select, button { font-size: 16px !important; touch-action: manipulation; }
    </style>
</head>
<body class="text-slate-900">

    <div id="entryPage" class="page active-page">
        <div class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b p-4 shadow-sm">
            <div class="flex justify-between items-center max-w-lg mx-auto">
                <div>
                    <h1 class="text-xl font-black italic text-emerald-900 uppercase leading-none">COAL<span class="text-emerald-500">DUMPING</span></h1>
                    <p id="saveStatus" class="text-[8px] font-black text-slate-400 uppercase mt-1 italic">Auto-Save Enabled</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="showPage('archivePage')" class="bg-emerald-600 text-white p-2.5 rounded-xl btn-tap shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" /></svg>
                    </button>
                    <input type="date" id="logDate" onchange="loadDayData()" class="bg-emerald-50 border-none rounded-xl p-2 text-xs font-black text-emerald-700 outline-none">
                </div>
            </div>
        </div>

        <div class="max-w-lg mx-auto px-4 mt-4">
            <div class="bg-emerald-900 rounded-[2.5rem] p-6 text-white shadow-2xl">
                <div class="flex justify-between items-center mb-4 text-[10px] font-black uppercase italic text-emerald-400">
                    <span>Live Yard Status</span>
                    <span id="activeYardBadge" class="bg-emerald-500 px-4 py-1 rounded-full text-white tracking-widest">---</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/10 rounded-3xl p-4 text-center">
                        <p class="text-[9px] font-black uppercase text-emerald-400 mb-1 tracking-widest">Day Shift</p>
                        <div class="flex justify-between items-end"><p id="dayBuckets" class="text-3xl font-black tracking-tighter">0</p><p id="dayTapon" class="text-sm font-black text-emerald-300 italic">0 <small class="text-[8px] opacity-50">TPN</small></p></div>
                    </div>
                    <div class="bg-white/10 rounded-3xl p-4 text-center">
                        <p class="text-[9px] font-black uppercase text-blue-400 mb-1 tracking-widest">Night Shift</p>
                        <div class="flex justify-between items-end"><p id="nightBuckets" class="text-3xl font-black tracking-tighter">0</p><p id="nightTapon" class="text-sm font-black text-blue-300 italic">0 <small class="text-[8px] opacity-50">TPN</small></p></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex mt-6 bg-slate-200/50 p-1.5 rounded-2xl max-w-[280px] mx-auto border border-white">
            <button onclick="switchBoiler('A')" id="tabA" class="flex-1 py-2 rounded-xl font-black text-[10px] uppercase transition-all bg-emerald-600 text-white shadow-md">Boiler A</button>
            <button onclick="switchBoiler('B')" id="tabB" class="flex-1 py-2 rounded-xl font-black text-[10px] uppercase text-emerald-600">Boiler B</button>
        </div>

        <div class="max-w-lg mx-auto p-4 mt-2">
            <div class="glass-card overflow-hidden">
                <div class="grid grid-cols-4 bg-emerald-50 p-4 text-[10px] font-black text-emerald-800 uppercase text-center border-b tracking-widest italic">
                    <div>Time</div><div>BKT</div><div>TPN</div><div>Yard</div>
                </div>
                <div id="logContainer" class="divide-y divide-slate-100"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-6 z-40 text-center">
            <div class="max-w-lg mx-auto">
                <p id="footerLabel" class="text-[10px] font-black text-emerald-500 uppercase italic mb-1">Boiler A Running Total</p>
                <div class="flex justify-center items-center gap-10">
                    <div class="text-center">
                        <p id="boilerTotalB" class="text-4xl font-black text-emerald-900 leading-none">0</p>
                        <p class="text-[9px] font-black uppercase text-slate-400 mt-1">Buckets</p>
                    </div>
                    <div class="h-10 w-[1px] bg-slate-200"></div>
                    <div class="text-center">
                        <p id="boilerTotalT" class="text-4xl font-black text-slate-400 leading-none">0</p>
                        <p class="text-[9px] font-black uppercase text-slate-400 mt-1 tracking-widest">Tapon</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="archivePage" class="page">
        <div class="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="showPage('entryPage')" class="bg-slate-100 p-2.5 rounded-xl text-slate-600 font-bold">←</button>
                <h2 class="text-xl font-black italic uppercase text-slate-800 tracking-tighter">Master <span class="text-emerald-500">History</span></h2>
            </div>
            <input type="date" id="archiveDateFilter" onchange="filterHistory()" class="bg-slate-100 border-none rounded-xl p-2 text-xs font-black text-slate-700 outline-none">
        </div>
        <div class="max-w-lg mx-auto p-4">
             <div class="flex bg-slate-200/50 p-1.5 rounded-2xl mb-6 border border-white">
                <button onclick="setShift('DAY')" id="btnDay" class="flex-1 py-2 rounded-xl font-black text-[10px] uppercase transition-all bg-emerald-600 text-white">Day Shift</button>
                <button onclick="setShift('NIGHT')" id="btnNight" class="flex-1 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500">Night Shift</button>
            </div>
            <div id="historyList" class="space-y-6"></div>
        </div>
    </div>

    <div id="compactModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-3">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeCompactEditor()"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2rem] p-5 shadow-2xl border border-emerald-100 overflow-y-auto max-h-[95vh]">
            
            <div class="flex justify-between items-center mb-4">
                <h3 id="editTitle" class="text-[10px] font-black text-emerald-800 uppercase italic tracking-widest">Entry Editor</h3>
                <button onclick="closeCompactEditor()" class="text-slate-300 text-2xl leading-none">&times;</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1 italic">Buckets</label>
                    <input type="text" id="editBuckets" readonly onfocus="showNumpad('editBuckets')" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-black text-emerald-600 text-center text-2xl outline-none" placeholder="0">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1 italic">Tapon</label>
                    <input type="text" id="editTapon" readonly onfocus="showNumpad('editTapon')" 
                        class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-black text-slate-700 text-center text-2xl outline-none" placeholder="0">
                </div>
            </div>

            <div class="flex flex-col gap-1 mb-4">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1 italic">Coal Yard Source</label>
                <select id="editYard" onfocus="hideNumpad()" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 font-black text-slate-700 text-base outline-none"></select>
            </div>

            <div id="numpadContainer" class="grid grid-cols-3 gap-1.5 opacity-0 h-0 overflow-hidden mb-4 transition-all duration-300">
                <button onclick="numpadInput(1)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">1</button>
                <button onclick="numpadInput(2)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">2</button>
                <button onclick="numpadInput(3)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">3</button>
                <button onclick="numpadInput(4)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">4</button>
                <button onclick="numpadInput(5)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">5</button>
                <button onclick="numpadInput(6)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">6</button>
                <button onclick="numpadInput(7)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">7</button>
                <button onclick="numpadInput(8)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">8</button>
                <button onclick="numpadInput(9)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">9</button>
                <button onclick="numpadInput('C')" class="py-3 bg-red-50 text-red-500 rounded-xl font-black text-[10px]">CLR</button>
                <button onclick="numpadInput(0)" class="py-3 bg-slate-100 rounded-xl font-black text-lg active:bg-emerald-200">0</button>
                <button onclick="numpadInput('D')" class="py-3 bg-slate-200 rounded-xl font-black text-lg text-slate-600">⌫</button>
            </div>

            <button id="saveBtn" onclick="saveCompactEdit()" class="w-full py-4 rounded-xl font-black text-[11px] uppercase bg-emerald-600 text-white shadow-lg btn-tap italic tracking-widest">
                Confirm & Save to Cloud
            </button>
        </div>
    </div>
    <script>
        const SB_URL = "https://qbeacrpoyfacgmbzxjcu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZWFjcnBveWZhY2dtYnp4amN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg2NTM5NTIsImV4cCI6MjA2NDIyOTk1Mn0.6kfxKLJxidW4BcqsMJte61AtzydrTW-1ZJIJytiUBt4";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        const yards = ["CY1", "CY2", "CY3", "CY4", "CY5", "CY6", "CY7", "CY8", "CY9"];
        const timeSlots = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
        let data = { A: {}, B: {} };
        let currentBoiler = 'A';
        let currentShift = 'DAY';
        let currentEditRef = { time: null, idx: null };
        let activeInputId = null;

        function showPage(p) { 
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page')); 
            document.getElementById(p).classList.add('active-page'); 
            if(p === 'archivePage') {
                document.getElementById('archiveDateFilter').value = document.getElementById('logDate').value;
                filterHistory();
            }
        }

        function setShift(s) {
            currentShift = s;
            document.getElementById('btnDay').className = s === 'DAY' ? "flex-1 py-2 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white" : "flex-1 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500";
            document.getElementById('btnNight').className = s === 'NIGHT' ? "flex-1 py-2 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white" : "flex-1 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500";
            filterHistory();
        }

        async function loadDayData() {
            const date = document.getElementById('logDate').value;
            const lastUsed = localStorage.getItem('lastUsedYard') || 'CY1';
            data = { A: {}, B: {} };
            try {
                const { data: dbLogs } = await supabaseClient.from('daily_bucket_logs').select('*').eq('log_date', date);
                if (dbLogs) dbLogs.forEach(log => {
                    if (!data[log.boiler][log.time_slot]) data[log.boiler][log.time_slot] = [];
                    data[log.boiler][log.time_slot].push({ buckets: log.buckets_used, tapon: log.tapon_count || 0, yard: log.yard_no });
                });
                ['A', 'B'].forEach(b => timeSlots.forEach(t => { if (!data[b][t]) data[b][t] = [{ buckets: 0, tapon: 0, yard: lastUsed }]; }));
                renderRows();
            } catch (err) { console.error(err); }
        }

      function renderRows() {
    const container = document.getElementById('logContainer'); 
    container.innerHTML = '';
    
    let globalRowIndex = 0;

    timeSlots.forEach((time) => {
        data[currentBoiler][time].forEach((entry, idx) => {
            const row = document.createElement('div');
            
            // DARKER ALTERNATE LOGIC
            const isOddRow = globalRowIndex % 2 !== 0;
            const bgColor = isOddRow ? 'bg-slate-100' : 'bg-white';
            
            row.className = `grid grid-cols-4 p-5 items-center text-center border-b border-slate-200 active:bg-emerald-200 transition-colors ${bgColor}`;
            row.onclick = () => openCompactEditor(time, idx);
            
            // TIME COLUMN LOGIC: Malaki ang Time (idx 0), Maliit ang Split (idx > 0)
            const timeDisplay = idx === 0 
                ? `<span class="text-lg font-black text-slate-900 tracking-tighter leading-none">${time}</span>` 
                : `<span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter leading-none">↳ Split</span>`;

            row.innerHTML = `
                <div class="text-left flex flex-col justify-center">
                    ${timeDisplay}
                    ${idx === 0 ? `<button onclick="event.stopPropagation(); addSplit('${time}')" class="text-[8px] font-black text-emerald-600 uppercase mt-1 text-left">+ SPLIT</button>` : ''}
                </div>
                <div class="text-3xl font-black text-emerald-600 tracking-tighter">${entry.buckets}</div>
                <div class="text-3xl font-black text-slate-500 tracking-tighter">${entry.tapon}</div>
                <div class="flex justify-between items-center text-[14px] font-black uppercase text-slate-900 tracking-widest pl-2">
                    ${entry.yard} 
                    ${idx > 0 ? `<button onclick="event.stopPropagation(); removeSplit('${time}',${idx})" class="text-red-500 text-3xl font-light ml-2">&times;</button>` : ''}
                </div>`;
            
            container.appendChild(row);
            globalRowIndex++;
        });
    });
    updateTotals();
}

        function openCompactEditor(time, idx) {
            currentEditRef = { time, idx };
            const entry = data[currentBoiler][time][idx];
            document.getElementById('editTitle').innerText = `TIME :  ${time} | BOILER ${currentBoiler}`;
            document.getElementById('editBuckets').value = entry.buckets;
            document.getElementById('editTapon').value = entry.tapon;
            document.getElementById('editYard').innerHTML = yards.map(y => `<option value="${y}" ${entry.yard === y ? 'selected' : ''}>${y}</option>`).join('');
            document.getElementById('compactModal').classList.remove('hidden');
            showNumpad('editBuckets');
        }

        function showNumpad(id) {
            activeInputId = id;
            document.getElementById('numpadContainer').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('numpadContainer').classList.replace('h-0', 'h-auto');
            document.getElementById('editBuckets').classList.remove('border-emerald-500');
            document.getElementById('editTapon').classList.remove('border-emerald-500');
            document.getElementById(id).classList.add('border-emerald-500');
        }

        function hideNumpad() { 
            document.getElementById('numpadContainer').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('numpadContainer').classList.replace('h-auto', 'h-0');
            activeInputId = null;
        }

        function numpadInput(v) {
            const input = document.getElementById(activeInputId);
            if(v === 'C') input.value = "0";
            else if(v === 'D') input.value = input.value.slice(0, -1) || "0";
            else {
                if(input.value === "0") input.value = v;
                else if(input.value.length < 4) input.value += v;
            }
        }

        async function saveCompactEdit() {
            const { time, idx } = currentEditRef;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "⏳ Saving..."; btn.disabled = true;

            // Update local data
            data[currentBoiler][time][idx].buckets = parseInt(document.getElementById('editBuckets').value) || 0;
            data[currentBoiler][time][idx].tapon = parseInt(document.getElementById('editTapon').value) || 0;
            const yrd = document.getElementById('editYard').value;
            data[currentBoiler][time][idx].yard = yrd;
            if(idx === 0) {
                const other = currentBoiler === 'A' ? 'B' : 'A';
                if(data[other][time]) data[other][time][0].yard = yrd;
            }
            localStorage.setItem('lastUsedYard', yrd);

            // AUTO CLOUD SAVE
            const date = document.getElementById('logDate').value;
            const logsToPush = [];
            ['A','B'].forEach(b => Object.keys(data[b]).forEach(t => data[b][t].forEach(e => {
                if(e.buckets > 0 || e.tapon > 0) logsToPush.push({ log_date: date, time_slot: t, boiler: b, buckets_used: e.buckets, tapon_count: e.tapon, yard_no: e.yard });
            })));

            try {
                await supabaseClient.from('daily_bucket_logs').delete().eq('log_date', date);
                if(logsToPush.length) await supabaseClient.from('daily_bucket_logs').insert(logsToPush);
                document.getElementById('saveStatus').innerText = "✓ Synced @ " + new Date().toLocaleTimeString();
            } catch(e) { 
                document.getElementById('saveStatus').innerText = "⚠️ Cloud Error"; 
            }

            btn.innerText = "Confirm & Save to Cloud"; btn.disabled = false;
            closeCompactEditor(); renderRows();
        }

        function closeCompactEditor() { document.getElementById('compactModal').classList.add('hidden'); hideNumpad(); }
        function addSplit(t) { ['A', 'B'].forEach(b => data[b][t].push({ buckets: 0, tapon: 0, yard: data[b][t][0].yard })); renderRows(); }
        function removeSplit(t, i) { ['A', 'B'].forEach(b => data[b][t].splice(i, 1)); renderRows(); }

        function updateTotals() {
            let db=0, dt=0, nb=0, nt=0, totB=0, totT=0, yardsUsed=new Set();
            timeSlots.forEach(t => {
                const hour = parseInt(t.split(':')[0]);
                const isDay = hour >= 6 && hour <= 17;
                ['A', 'B'].forEach(b => {
                    if(data[b][t]) data[b][t].forEach(e => {
                        if(b === currentBoiler) {
                            if(isDay) { db+=e.buckets; dt+=e.tapon; } else { nb+=e.buckets; nt+=e.tapon; }
                            totB += e.buckets; totT += e.tapon;
                        }
                        if(e.buckets > 0) yardsUsed.add(e.yard);
                    });
                });
            });
            document.getElementById('dayBuckets').innerText = db; document.getElementById('dayTapon').innerText = dt;
            document.getElementById('nightBuckets').innerText = nb; document.getElementById('nightTapon').innerText = nt;
            document.getElementById('boilerTotalB').innerText = totB; document.getElementById('boilerTotalT').innerText = totT;
            document.getElementById('activeYardBadge').innerText = yardsUsed.size ? Array.from(yardsUsed).join(' - ') : "---";
        }

        async function filterHistory() {
            const selDate = document.getElementById('archiveDateFilter').value;
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '<p class="text-center p-10 text-[10px] font-black uppercase text-slate-400 italic">Fetching Cloud Data...</p>';
            try {
                const { data: dbLogs } = await supabaseClient.from('daily_bucket_logs').select('*').eq('log_date', selDate).order('time_slot', { ascending: true });
                let rowsA = [], rowsB = [], grandB = 0, grandT = 0;
                dbLogs.forEach(log => {
                    const hour = parseInt(log.time_slot.split(':')[0]);
                    const isDay = hour >= 6 && hour <= 17;
                    if ((currentShift === 'DAY' && isDay) || (currentShift === 'NIGHT' && !isDay)) {
                        grandB += log.buckets_used; grandT += (log.tapon_count || 0);
                        const rowData = { t: log.time_slot, bkt: log.buckets_used, tpn: log.tapon_count || 0, yard: log.yard_no };
                        if (log.boiler === 'A') rowsA.push(rowData); else rowsB.push(rowData);
                    }
                });
                renderArchiveUI(grandB, grandT, rowsA, rowsB);
            } catch (err) { historyList.innerHTML = '<p>Cloud Sync Error.</p>'; }
        }

        function renderArchiveUI(grandB, grandT, rowsA, rowsB) {
            const createTable = (boilerName, rows, color) => {
                const rowsHTML = rows.length > 0 ? rows.map(r => `<tr><td class="p-3 font-bold">${r.t}</td><td class="p-3 text-center text-xl font-black">${r.bkt}</td><td class="p-3 text-center text-slate-400 font-bold">${r.tpn}</td><td class="p-3 text-right font-black text-emerald-600">${r.yard}</td></tr>`).join('') : `<tr><td colspan="4" class="p-5 text-center italic text-slate-400">No logs found</td></tr>`;
                return `<div class="bg-white rounded-[2rem] overflow-hidden mb-6 border border-slate-100 shadow-sm"><div class="${color} text-white px-5 py-3 flex justify-between items-center"><span class="text-[11px] font-black tracking-widest uppercase">BOILER ${boilerName}</span><span class="text-[11px] font-black">${rows.reduce((s, r) => s + r.bkt, 0)} BKT</span></div><table class="w-full text-[12px]"><tbody class="divide-y divide-slate-50">${rowsHTML}</tbody></table></div>`;
            };
            document.getElementById('historyList').innerHTML = `<div class="bg-emerald-900 rounded-[2.5rem] p-7 text-white mb-6 shadow-xl"><div class="flex justify-between items-start"><div><p class="text-[10px] font-black text-emerald-400 tracking-widest uppercase">Combined Total</p><h3 class="text-4xl font-black">${grandB} <small class="text-xs font-normal opacity-50">BKT</small></h3></div><div class="text-right"><p class="text-[10px] font-black text-slate-400 italic mb-1 uppercase tracking-widest">${currentShift}</p><p class="text-2xl font-black text-emerald-200">${grandT} <small class="text-xs font-normal opacity-50">TPN</small></p></div></div></div>${createTable('A', rowsA, 'bg-slate-800')}${createTable('B', rowsB, 'bg-emerald-700')}`;
        }

        function switchBoiler(b) {
            currentBoiler = b;
            document.getElementById('tabA').className = b === 'A' ? "flex-1 py-2 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white shadow-md" : "flex-1 py-2 rounded-xl font-black text-[10px] uppercase text-emerald-600";
            document.getElementById('tabB').className = b === 'B' ? "flex-1 py-2 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white shadow-md" : "flex-1 py-2 rounded-xl font-black text-[10px] uppercase text-emerald-600";
            document.getElementById('footerLabel').innerText = `Boiler ${b} Running Total`;
            renderRows();
        }

        const ph = new Date().toLocaleDateString('en-CA', {timeZone: 'Asia/Manila'});
        document.getElementById('logDate').value = ph;
        loadDayData();
